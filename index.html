<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRADABET Premium Affiliate</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap');
        
        :root {
            --primary-color: #d10068;
            --secondary-color: #a3005e;
            --dark-bg: #0f0f0f;
            --light-text: #ffffff;
            --instagram-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: url('background.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--light-text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(209, 0, 104, 0.25) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(209, 0, 104, 0.25) 0%, transparent 40%),
                linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            z-index: -2;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: 40px auto;
            padding: 40px;
            box-sizing: border-box;
            position: relative;
            background-color: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(209, 0, 104, 0.3);
            border: 1px solid rgba(209, 0, 104, 0.2);
            border-radius: 15px;
        }

        @keyframes title-glow {
            0%, 100% { text-shadow: 0 0 10px rgba(209, 0, 104, 0.7); box-shadow: 0 0 20px rgba(209, 0, 104, 0.3); }
            50% { text-shadow: 0 0 20px rgba(255, 42, 138, 0.9); box-shadow: 0 0 30px rgba(209, 0, 104, 0.5); }
        }

        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(40px, 8vw, 72px);
            font-weight: bold;
            color: var(--primary-color);
            margin: 20px 0;
            animation: title-glow 3s infinite ease-in-out;
            letter-spacing: 2px;
            text-align: center;
            display: block;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            color: var(--primary-color);
            font-size: 24px;
            font-weight: bold;
            margin: 25px 0;
            padding: 10px 15px;
            border-left: 4px solid var(--primary-color);
            background: rgba(209, 0, 104, 0.05);
            border-radius: 0 8px 8px 0;
        }

        .highlight-box {
            display: inline-block;
            padding: 5px 12px;
            margin: 5px 0;
            background: rgba(209, 0, 104, 0.1);
            border: 1px solid var(--primary-color);
            border-radius: 5px;
        }

        .header { text-align: center; margin-bottom: 40px; border-bottom: 3px solid var(--primary-color); padding-bottom: 25px; }
        
        .slogan { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--light-text); font-style: italic; margin: 20px 0; }

        .commission-value { font-family: 'Montserrat', sans-serif; font-weight: 900; color: #ff2a8a; }

        ul { list-style: none; padding: 0; }
        li { margin-bottom: 15px; font-size: 16px; line-height: 1.6; }
        li::before { content: "•"; color: var(--primary-color); font-weight: bold; margin-right: 10px; }

        img.logo { height: 100px; margin: 10px auto; display: block; filter: drop-shadow(0 0 10px var(--primary-color)); }

        .cta-box {
            background: rgba(209, 0, 104, 0.05);
            border: 2px solid var(--primary-color);
            padding: 25px;
            margin: 40px 0;
            border-radius: 8px;
            text-align: center;
        }

        .footer { text-align: center; margin-top: 50px; padding-top: 25px; border-top: 1px solid #444; }

        /* SPONSOR ALANI - GITHUB DOSYALARINA GÖRE AYARLANDI */
        .sponsor-text { color: var(--primary-color); font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: bold; letter-spacing: 2px; margin-bottom: 20px; }
        .sponsor-logos { display: flex; justify-content: center; align-items: center; gap: 20px; flex-wrap: wrap; }
        .sponsor-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 15px;
            border-radius: 30px;
            border: 1px solid rgba(209, 0, 104, 0.2);
        }
        .sponsor-item img { height: 25px; width: auto; }
        .sponsor-item span { font-size: 12px; font-weight: 600; color: #fff; font-family: 'Montserrat'; }

        /* SABİT BUTONLAR */
        .floating-container { position: fixed; right: 30px; z-index: 9999; display: flex; flex-direction: column; gap: 15px; }
        .btn-link { 
            width: 60px; height: 60px; border-radius: 50%; border: 2px solid white;
            display: flex; align-items: center; justify-content: center; text-decoration: none; color: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.5); transition: 0.3s;
        }
        .btn-link:hover { transform: scale(1.1); }
        .insta-btn { background: var(--instagram-gradient); bottom: 110px; position: fixed; }
        .tele-btn { background: #0088cc; bottom: 30px; position: fixed; }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-text">PRADABET</div>
            <img src="logo.png" alt="PRADABET Logo" class="logo">
            <div class="slogan"><span class="highlight-box">KAZANÇ</span> Nerede? Prada Orada!</div>
        </div>

        <div class="section-title">Komisyon Modeli</div>
        <ul>
            <li><span class="highlight-box">TC Onaylı Üye:</span> <span class="commission-value">30 TL</span></li>
            <li><span class="highlight-box">FDT Başına:</span> <span class="commission-value">100 TL</span></li>
            <li><span class="highlight-box">Net Kar Ortaklığı:</span> <span class="commission-value">%20</span></li>
        </ul>

        <div class="cta-box">
            <div class="section-title" style="border:none; background:none; text-align:center;">Elite Partner Olun!</div>
            <p><strong>Telegram:</strong> <a href="https://t.me/PradaSarp" style="color:var(--primary-color); text-decoration:none;">@PradaSarp</a></p>
            <p><strong>Site:</strong> <a href="https://bit.ly/4jDtb8C" style="color:var(--primary-color); text-decoration:none;">bit.ly/4jDtb8C</a></p>
        </div>

        <div class="footer">
            <span style="display:block; margin-bottom:15px; color:#aaa;">PRADABET Premium Marketing Ekibi © 2026</span>
            <div class="sponsor-text">RESMİ SPONSORLAR</div>
            <div class="sponsor-logos">
                <div class="sponsor-item">
                    <img src="mcity.png" alt="MCFC">
                    <span>MANCHESTER CITY</span>
                </div>
                <div class="sponsor-item">
                    <img src="rolex.png" alt="Rolex">
                    <span>ROLEX</span>
                </div>
                <div class="sponsor-item">
                    <img src="redbull.png" alt="Red Bull">
                    <span>RED BULL</span>
                </div>
            </div>
        </div>
    </div>

    <a href="https://www.instagram.com/marketingsarp" target="_blank" class="btn-link insta-btn">IG</a>
    <a href="https://t.me/PradaSarp" target="_blank" class="btn-link tele-btn">TG</a>
</body>
</html>
