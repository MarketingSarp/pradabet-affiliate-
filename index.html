<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRADABET Premium Affiliate</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap');
        
        :root {
            --primary-color: #d10068;
            --dark-bg: #0f0f0f;
            --light-text: #ffffff;
            --instagram-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: var(--dark-bg);
            color: var(--light-text);
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: 20px auto;
            padding: 40px;
            background-color: rgba(20, 20, 20, 0.95);
            box-shadow: 0 0 50px rgba(209, 0, 104, 0.3);
            border: 1px solid rgba(209, 0, 104, 0.2);
            border-radius: 15px;
            text-align: center;
        }

        .logo-text { font-family: 'Montserrat', sans-serif; font-size: 50px; color: var(--primary-color); text-shadow: 0 0 10px rgba(209, 0, 104, 0.7); margin-bottom: 10px; }
        
        .section-title { font-family: 'Playfair Display', serif; color: var(--primary-color); font-size: 24px; margin: 25px 0; border-left: 4px solid var(--primary-color); padding-left: 15px; text-align: left; }
        
        .cta-box { background: rgba(209, 0, 104, 0.05); border: 2px solid var(--primary-color); padding: 25px; margin: 30px 0; border-radius: 10px; }

        /* FOOTER & SPONSOR TASARIMI */
        .footer { margin-top: 50px; border-top: 1px solid #333; padding-top: 30px; }
        .footer-date { font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 5px; display: block; font-family: 'Montserrat', sans-serif; }
        .sponsor-text { color: var(--primary-color); font-size: 14px; font-weight: bold; letter-spacing: 2px; margin-bottom: 25px; }
        
        .sponsor-logos { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; align-items: center; }
        
        .sponsor-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 130px;
            transition: 0.3s;
        }

        .sponsor-item img {
            height: 45px;
            width: auto;
            margin-bottom: 10px;
            /* Yüklediğin logolar renkliyse ve beyaz olsun istersen alttaki satırı açabilirsin */
            /* filter: brightness(0) invert(1); */
        }

        .sponsor-item span { font-family: 'Montserrat', sans-serif; font-size: 11px; color: #aaa; letter-spacing: 1px; font-weight: bold; }

        /* Sabit Butonlar */
        .floating-btn { position: fixed; right: 20px; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; text-decoration: none; color: white; font-weight: bold; z-index: 1000; font-size: 14px; }
        .insta { bottom: 100px; background: var(--instagram-gradient); }
        .tele { bottom: 20px; background: #0088cc; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-text">PRADABET</div>
            <img src="logo.png" alt="Logo" style="height: 75px;">
        </div>

        <div class="section-title">Partnerlik Detayları</div>
        <div style="text-align: left; line-height: 2;">
            <p>• <span style="color:var(--primary-color); font-weight: bold;">TC Onaylı Üye:</span> 30 TL</p>
            <p>• <span style="color:var(--primary-color); font-weight: bold;">FDT (İlk Yatırım):</span> 100 TL</p>
            <p>• <span style="color:var(--primary-color); font-weight: bold;">Net Kar Ortaklığı:</span> %20</p>
        </div>

        <div class="cta-box">
            <p><strong>Telegram:</strong> @PradaSarp | <strong>Site:</strong> bit.ly/4jDtb8C</p>
        </div>

        <div class="footer">
            <span class="footer-date">2026</span>
            <div class="sponsor-text">RESMİ SPONSORLAR</div>
            
            <div class="sponsor-logos">
                <div class="sponsor-item">
                    <img src="mcity.png" alt="Manchester City">
                    <span>MANCHESTER CITY</span>
                </div>
                
                <div class="sponsor-item">
                    <img src="rolex.png" alt="Rolex">
                    <span>ROLEX</span>
                </div>
                
                <div class="sponsor-item">
                    <img src="redbull.png" alt="Red Bull">
                    <span>RED BULL</span>
                </div>
            </div>
            
            <p style="font-size: 11px; color: #444; margin-top: 40px; letter-spacing: 1px;">PRADABET PREMIUM MARKETING EKİBİ © 2026</p>
        </div>
    </div>

    <a href="https://www.instagram.com/marketingsarp" class="floating-btn insta" target="_blank">INSTA</a>
    <a href="https://t.me/palycc" class="floating-btn tele" target="_blank">DESTEK</a>
</body>
</html>
